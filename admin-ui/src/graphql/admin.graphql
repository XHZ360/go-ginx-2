fragment PageInfoFields on AdminPageInfo {
  page
  pageSize
  totalCount
  totalPages
  hasNext
  hasPrev
}

fragment UserFields on AdminUser {
  id
  username
  role
  status
  clientCount
  proxyCount
  uploadBytes
  downloadBytes
  lastActivityAt
  hasPasswordHash
  createdAt
  updatedAt
}

fragment ClientRuntimeFields on AdminClientRuntime {
  online
  protocol
  connectedAt
  lastHeartbeat
  configVersion
  activeProxies
  activeStreams
  uploadBytes
  downloadBytes
  errorSummary
}

fragment ProxySummaryFields on AdminProxySummary {
  id
  name
  type
  status
  runtimeStatus
  entryBindHost
  entryHost
  entryPort
  targetHost
  targetPort
  activeTCPConnections
}

fragment ClientFields on AdminClient {
  id
  userId
  name
  status
  version
  runtime {
    ...ClientRuntimeFields
  }
  lastOnlineAt
  lastOfflineAt
  createdAt
  updatedAt
}

fragment ClientDetailFields on AdminClientDetail {
  id
  userId
  name
  status
  version
  runtime {
    ...ClientRuntimeFields
  }
  lastOnlineAt
  lastOfflineAt
  managedProxies {
    ...ProxySummaryFields
  }
  createdAt
  updatedAt
}

fragment ProxyConfigFields on AdminProxyConfig {
  domainId
  pathPrefix
  stripPrefix
  upstreamPathPrefix
  entryBindHost
  entryHost
  entryPort
  targetHost
  targetPort
  certFile
  keyFile
  certificateId
}

fragment ManagedCertificateFields on AdminManagedCertificate {
  proxyId
  certificateId
  boundProxyId
  boundDomainId
  referenced
  servable
  deletionRisk
  host
  status
  servingStatus
  operationStatus
  providerType
  providerName
  credentialId
  providerStatus
  cloudflareCertificateId
  hostnames
  requestType
  requestedValidity
  lastSyncedAt
  deploymentHints
  notAfter
  lastIssuedAt
  lastRenewedAt
  lastCheckedAt
  lastAttemptedAt
  nextAttemptAt
  failureCount
  fingerprint
  lastError
}

fragment DomainEntryFields on AdminDomainEntry {
  id
  domainId
  protocol
  bindHost
  port
  status
  createdAt
  updatedAt
}

fragment DomainFields on AdminDomain {
  id
  userId
  host
  certificateId
  status
  proxyCount
  httpEntryCount
  httpsEntryCount
  certificate {
    ...ManagedCertificateFields
  }
  entries {
    ...DomainEntryFields
  }
  proxies {
    ...ProxyFields
  }
  createdAt
  updatedAt
}

fragment DomainSummaryFields on AdminDomain {
  id
  userId
  host
  certificateId
  status
  proxyCount
  httpEntryCount
  httpsEntryCount
  certificate {
    ...ManagedCertificateFields
  }
  createdAt
  updatedAt
}

fragment ProviderCredentialFields on AdminProviderCredential {
  id
  name
  providerType
  scope
  tokenFingerprint
  status
  lastVerifiedAt
  lastError
  createdAt
  updatedAt
}

fragment ProxyFields on AdminProxy {
  id
  userId
  clientId
  name
  type
  status
  description
  runtimeStatus
  activeTCPConnections
  uploadBytes
  downloadBytes
  tcpErrorCount
  udpErrorCount
  httpErrorCount
  accessAuthEnabled
  accessAuthVersion
  config {
    ...ProxyConfigFields
  }
  certificate {
    ...ManagedCertificateFields
  }
  createdAt
  updatedAt
}

fragment ProxyActivationFields on AdminProxyActivation {
  url
  expiresAt
}

fragment AuditFields on AdminAuditEvent {
  id
  actorType
  actorId
  resourceType
  resourceId
  action
  result
  createdAt
}

fragment UserPayloadFields on AdminUserPayload {
  userId
  status
  user {
    ...UserFields
  }
}

fragment ClientPayloadFields on AdminClientPayload {
  clientId
  credential
  token
  client {
    ...ClientDetailFields
  }
}

fragment ProxyPayloadFields on AdminProxyPayload {
  proxyId
  status
  proxy {
    ...ProxyFields
  }
}

fragment CertificatePayloadFields on AdminCertificatePayload {
  proxyId
  status
  certificate {
    ...ManagedCertificateFields
  }
}

fragment ProviderCredentialPayloadFields on AdminProviderCredentialPayload {
  id
  status
  credential {
    ...ProviderCredentialFields
  }
}

query Dashboard {
  dashboard {
    onlineClientCount
    enabledProxyCount
    activeTCPConnectionCount
    cumulativeUploadBytes
    cumulativeDownloadBytes
    cumulativeTCPErrorCount
    cumulativeUDPErrorCount
    cumulativeHTTPErrorCount
  }
}

query Users($input: AdminUsersInput) {
  users(input: $input) {
    totalCount
    pageInfo {
      ...PageInfoFields
    }
    items {
      ...UserFields
    }
  }
}

query User($id: String!) {
  user(id: $id) {
    ...UserFields
  }
}

query Clients($input: AdminClientsInput) {
  clients(input: $input) {
    totalCount
    pageInfo {
      ...PageInfoFields
    }
    items {
      ...ClientFields
    }
  }
}

query Client($id: String!) {
  client(id: $id) {
    ...ClientDetailFields
  }
}

query Proxies($input: AdminProxiesInput) {
  proxies(input: $input) {
    totalCount
    pageInfo {
      ...PageInfoFields
    }
    items {
      ...ProxyFields
    }
  }
}

query Domains($input: AdminDomainsInput) {
  domains(input: $input) {
    totalCount
    pageInfo {
      ...PageInfoFields
    }
    items {
      ...DomainSummaryFields
    }
  }
}

query Domain($id: String!) {
  domain(id: $id) {
    ...DomainFields
  }
}

query Proxy($id: String!) {
  proxy(id: $id) {
    ...ProxyFields
  }
}

query ProxyEntryOptions {
  proxyEntryOptions {
    tcpDefaultBindHost
    httpDefaultBindHost
    httpDefaultPort
    httpsDefaultBindHost
    httpsDefaultPort
    hosts {
      value
      label
      isDefault
    }
  }
}

query Certificates($input: AdminCertificatesInput) {
  certificates(input: $input) {
    totalCount
    pageInfo {
      ...PageInfoFields
    }
    items {
      ...ManagedCertificateFields
    }
  }
}

query ProviderCredentials($input: AdminProviderCredentialsInput) {
  providerCredentials(input: $input) {
    totalCount
    pageInfo {
      ...PageInfoFields
    }
    items {
      ...ProviderCredentialFields
    }
  }
}

query Audit($input: AdminAuditInput) {
  audit(input: $input) {
    totalCount
    pageInfo {
      ...PageInfoFields
    }
    items {
      ...AuditFields
    }
  }
}

